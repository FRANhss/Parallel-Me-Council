  <g class="font" filter="url(#softShadow)">
    <rect x="756" y="508" width="348" height="64" rx="22" fill="#0B1220" stroke="#34D399" stroke-opacity="0.42"/>
    <text x="790" y="548" fill="#D1FAE5" font-size="23" font-weight="800">下一步：联系 5 个试用用户</text>
