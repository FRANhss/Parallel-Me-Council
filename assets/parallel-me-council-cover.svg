<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>平行自我委员会</title>
  <desc>平行自我委员会封面。隐含成员包括现实资源官、长期主义者、情绪诚实者和行动设计师。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#05060C"/>
      <stop offset="0.48" stop-color="#0A0D18"/>
      <stop offset="1" stop-color="#071923"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(940 318) rotate(90) scale(360 360)">
      <stop stop-color="#EAFBFF" stop-opacity="0.72"/>
      <stop offset="0.16" stop-color="#8BE9FF" stop-opacity="0.48"/>
      <stop offset="0.38" stop-color="#8B5CF6" stop-opacity="0.28"/>
      <stop offset="0.72" stop-color="#05060C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="softViolet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 130) rotate(128) scale(520 340)">
      <stop stop-color="#7C3AED" stop-opacity="0.28"/>
      <stop offset="0.75" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="108" y1="294" x2="622" y2="294" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#F4F7FB"/>
      <stop offset="1" stop-color="#C9F6FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="690" y1="118" x2="1188" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC" stop-opacity="0.94"/>
      <stop offset="0.48" stop-color="#67E8F9" stop-opacity="0.76"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="fineGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#67E8F9" flood-opacity="0.28"/>
    </filter>
    <style>
      .type { font-family: Inter, "SF Pro Display", "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#softViolet)"/>
  <rect width="1280" height="640" fill="url(#halo)"/>

  <g transform="translate(930 318)">
    <circle r="176" fill="#EAFBFF" opacity="0.08" filter="url(#glow)"/>
    <circle r="164" stroke="url(#ring)" stroke-width="1.7" stroke-opacity="0.68" filter="url(#fineGlow)"/>
    <circle r="112" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.14"/>
    <circle r="62" stroke="#FFFFFF" stroke-width="1" stroke-opacity="0.1"/>
    <circle cx="-116" cy="-78" r="5.5" fill="#FFFFFF" fill-opacity="0.82"/>
    <circle cx="100" cy="88" r="5.5" fill="#67E8F9" fill-opacity="0.82"/>
    <circle cx="-18" cy="154" r="4.5" fill="#A78BFA" fill-opacity="0.78"/>
  </g>

  <g class="type">
    <text x="108" y="298" fill="url(#title)" font-size="82" font-weight="780" letter-spacing="-0.06em">平行自我委员会</text>
    <text x="112" y="354" fill="#A9B7C8" font-size="24" font-weight="500" letter-spacing="0.14em">证据 · 反证 · 回滚</text>
  </g>
</svg>
