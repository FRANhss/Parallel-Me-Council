<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080A18"/>
      <stop offset="0.45" stop-color="#11143A"/>
      <stop offset="1" stop-color="#071B2D"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 142) rotate(38) scale(560 380)">
      <stop stop-color="#8B5CF6" stop-opacity="0.62"/>
      <stop offset="0.65" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1050 160) rotate(134) scale(540 360)">
      <stop stop-color="#22D3EE" stop-opacity="0.46"/>
      <stop offset="0.72" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 690) rotate(90) scale(540 760)">
      <stop stop-color="#F472B6" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="heroText" x1="126" y1="190" x2="662" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.52" stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#A5F3FC"/>
    </linearGradient>
    <linearGradient id="panel" x1="692" y1="106" x2="1130" y2="548" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827" stop-opacity="0.94"/>
