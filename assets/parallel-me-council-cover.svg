    </filter>
    <filter id="softShadow" x="-16%" y="-16%" width="132%" height="132%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <style>
      .font { font-family: Inter, "HarmonyOS Sans SC", "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif; }
      .small { font-size: 22px; letter-spacing: 0.04em; }
      .body { font-size: 26px; }
      .label { font-size: 24px; font-weight: 760; }
      .hint { font-size: 20px; }
    </style>
