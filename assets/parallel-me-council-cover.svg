  <rect width="1280" height="640" rx="0" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#violetGlow)"/>
  <rect width="1280" height="640" fill="url(#cyanGlow)"/>
  <rect width="1280" height="640" fill="url(#pinkGlow)"/>

  <g opacity="0.16">
    <path d="M-40 514C118 430 248 520 398 444C548 368 604 246 788 284C974 322 1046 446 1328 330" stroke="#67E8F9" stroke-width="2"/>
    <path d="M-28 160C174 210 282 68 462 116C626 160 690 248 864 210C1036 172 1098 70 1308 118" stroke="#C4B5FD" stroke-width="2"/>
  </g>

  <g class="font">
