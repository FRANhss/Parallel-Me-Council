    <text x="96" y="336" fill="#91A4BE" font-size="24" font-weight="500">证据先说话，风险有边界，行动可回滚。</text>

    <g transform="translate(96 394)">
      <rect x="0" y="0" width="132" height="56" rx="18" fill="#111827" fill-opacity="0.78" stroke="#7C3AED" stroke-opacity="0.62"/>
      <text x="66" y="36" text-anchor="middle" fill="#EDE9FE" font-size="23" font-weight="800">证据</text>
      <rect x="150" y="0" width="132" height="56" rx="18" fill="#111827" fill-opacity="0.78" stroke="#22D3EE" stroke-opacity="0.62"/>
      <text x="216" y="36" text-anchor="middle" fill="#CFFAFE" font-size="23" font-weight="800">反证</text>
      <rect x="300" y="0" width="176" height="56" rx="18" fill="#111827" fill-opacity="0.78" stroke="#34D399" stroke-opacity="0.62"/>
      <text x="388" y="36" text-anchor="middle" fill="#D1FAE5" font-size="23" font-weight="800">回滚线</text>
