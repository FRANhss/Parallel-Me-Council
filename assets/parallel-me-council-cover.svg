      <rect x="0" y="0" width="356" height="54" rx="27" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <circle cx="31" cy="27" r="8" fill="#34D399"/>
      <text x="55" y="35" fill="#C4B5FD" class="small" font-weight="700">中文决策协议 · Agent Skill</text>
