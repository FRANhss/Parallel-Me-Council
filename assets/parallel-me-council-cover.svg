      <circle cx="16" cy="16" r="8" fill="#F87171"/>
      <circle cx="44" cy="16" r="8" fill="#FBBF24"/>
      <circle cx="72" cy="16" r="8" fill="#34D399"/>
      <text x="318" y="23" text-anchor="end" fill="#8FA2BB" font-size="19" font-weight="700">今日议题</text>
    </g>

