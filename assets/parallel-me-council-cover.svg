<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>平行自我委员会</title>
  <desc>平行自我委员会封面。隐含成员包括现实资源官、长期主义者、情绪诚实者和行动设计师。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#080716"/>
      <stop offset="0.48" stop-color="#10132B"/>
      <stop offset="1" stop-color="#061721"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(300 120) rotate(38) scale(560 420)">
      <stop stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="0.72" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 230) rotate(126) scale(520 420)">
      <stop stop-color="#22D3EE" stop-opacity="0.38"/>
      <stop offset="0.72" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="342" y1="304" x2="938" y2="304" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#EDE9FE"/>
      <stop offset="1" stop-color="#BFF7FF"/>
    </linearGradient>
    <linearGradient id="ring" x1="360" y1="96" x2="920" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <style>
      .type { font-family: Inter, "Microsoft YaHei", "PingFang SC", sans-serif; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#glowA)"/>
  <rect width="1280" height="640" fill="url(#glowB)"/>

  <g opacity="0.12">
    <path d="M-80 400C150 292 322 470 540 342C758 214 906 292 1360 178" stroke="#FFFFFF" stroke-width="1.4"/>
    <path d="M-80 204C188 282 320 102 538 178C756 254 914 154 1360 246" stroke="#FFFFFF" stroke-width="1.2"/>
  </g>

  <g transform="translate(640 320)">
    <circle r="218" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="1"/>
    <circle r="164" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="1"/>
    <circle r="102" stroke="url(#ring)" stroke-opacity="0.9" stroke-width="1.8"/>
    <circle r="88" fill="#020617" fill-opacity="0.2"/>
    <circle cx="-164" cy="-74" r="8" fill="#A78BFA"/>
    <circle cx="166" cy="-76" r="8" fill="#22D3EE"/>
    <circle cx="-114" cy="170" r="8" fill="#F472B6"/>
    <circle cx="142" cy="154" r="8" fill="#34D399"/>
    <circle r="38" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle r="10" fill="#EDE9FE" filter="url(#blur)" opacity="0.82"/>
  </g>

  <g class="type" text-anchor="middle">
    <text x="640" y="310" fill="url(#title)" font-size="82" font-weight="850" letter-spacing="-0.055em">平行自我委员会</text>
    <text x="640" y="366" fill="#AFC1D8" font-size="25" font-weight="500" letter-spacing="0.12em">证据 · 反证 · 回滚</text>
  </g>

  <rect x="528" y="430" width="224" height="2" rx="1" fill="url(#ring)" opacity="0.72"/>
</svg>
