      <text x="28" y="110" fill="#F8FAFC" font-size="26" font-weight="820">要不要辞职做自己的产品？</text>
      <text x="28" y="144" fill="#BFD0EA" font-size="20" font-weight="650">信心：中低 · 可逆性：中 · 先验证付费</text>
    </g>

    <g transform="translate(0 194)">
      <rect x="0" y="0" width="392" height="62" rx="20" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="34" cy="31" r="17" fill="#7C3AED"/>
      <text x="34" y="39" text-anchor="middle" fill="#FFFFFF" font-size="20" font-weight="900">现</text>
      <text x="66" y="26" fill="#F5F3FF" class="label">现实资源官</text>
      <text x="230" y="26" fill="#96A8C2" class="hint">先稳住现金流</text>
      <rect x="302" y="36" width="58" height="12" rx="6" fill="#7C3AED" fill-opacity="0.56"/>
    </g>

    <g transform="translate(0 270)">
      <rect x="0" y="0" width="392" height="62" rx="20" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="34" cy="31" r="17" fill="#22D3EE"/>
      <text x="34" y="39" text-anchor="middle" fill="#042F3A" font-size="20" font-weight="900">长</text>
      <text x="66" y="26" fill="#ECFEFF" class="label">长期主义者</text>
      <text x="230" y="26" fill="#96A8C2" class="hint">看五年后的代价</text>
      <rect x="302" y="36" width="86" height="12" rx="6" fill="#22D3EE" fill-opacity="0.56"/>
    </g>

    <g transform="translate(0 346)">
      <rect x="0" y="0" width="392" height="62" rx="20" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.1"/>
      <circle cx="34" cy="31" r="17" fill="#34D399"/>
      <text x="34" y="39" text-anchor="middle" fill="#052E22" font-size="20" font-weight="900">行</text>
      <text x="66" y="26" fill="#ECFDF5" class="label">行动设计师</text>
      <text x="230" y="26" fill="#96A8C2" class="hint">24 小时验证</text>
      <rect x="302" y="36" width="72" height="12" rx="6" fill="#34D399" fill-opacity="0.56"/>
