    </linearGradient>
    <linearGradient id="card1" x1="734" y1="218" x2="1092" y2="306" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7C3AED" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.16"/>
    </linearGradient>
    <linearGradient id="accent" x1="116" y1="438" x2="526" y2="438" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="136%" color-interpolation-filters="sRGB">
